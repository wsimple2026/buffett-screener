[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."claude"]
  timeout = 30

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co https://api.anthropic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
